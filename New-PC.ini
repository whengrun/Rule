;20260326_Version:B1

[common]
target=clash
expand=true
udp=true
skip-cert-verify=true
sort=true
enable_rule_generator=true
overwrite_original_rules=true

# =========================
# 1. 清理垃圾关键词（先做）
# =========================
rename=(?i)\b(IEPL|IPLC|BGP)\b@
rename=(?i)(宽频|家宽|residential)@-LQ
rename=(?i)(边缘|edge|cdn)@-LQ
rename=(?i)(VIP|Premium|优化)@-HQ
rename=(?i)(netflix|nf)@-NF
rename=\s+@          # 去掉多余空格
rename=\-+@-        # 多个 - 合并
# =========================
# 2. 国家识别（统一标签）
# =========================
rename=(?i)(香港|hong kong|\bHK\b)@香港
rename=(?i)(日本|japan|\bJP\b)@日本
rename=(?i)(美国|united states|\bUS\b)@美国
rename=(?i)(新加坡|singapore|\bSG\b|狮城)@新加坡
rename=(?i)(台湾|臺灣|台灣|taiwan|\bTW\b)@台湾
# =========================
# 3. 提取编号（核心）
# =========================
rename=(?i)(香港).*?(\d+)@香港-$2
rename=(?i)(日本).*?(\d+)@日本-$2
rename=(?i)(美国).*?(\d+)@美国-$2
rename=(?i)(新加坡).*?(\d+)@新加坡-$2
rename=(?i)(台湾).*?(\d+)@台湾-$2
# =========================
# 4. 没编号的补默认
# =========================
rename=^(香港)$@香港-01
rename=^(日本)$@日本-01
rename=^(美国)$@美国-01
rename=^(新加坡)$@新加坡-01
rename=^(台湾)$@台湾-01
# =========================
# 5. 最终清理
# =========================
rename=\s+@
rename=--+@-
rename=-$@

